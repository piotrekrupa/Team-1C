<!DOCTYPE html>
{% load static %}
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Forums</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
  </head>
    <body>
        <div>
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid position-relative d-flex justify-content-between align-items-center px-4">
            <a class="navbar-brand" href="{% url 'forum:home' %}">
                <img src="{% static 'images/logo.png' %}" alt="Logo" width="30" height="24" class="d-inline-block align-text-top">
                Forums</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav d-flex flex-row gap-3 mb-0">
                    <li class="nav-item">
                    <a class="nav-link p-0" aria-current="page" href="{% url 'forum:home' %}">Home</a>
                    </li>
                    <li class="nav-item">
                    <a class="nav-link p-0" aria-current="page" href="{% url 'forum:internships' %}">Internships</a>
                    </li>
                    <li class="nav-item">
                    <a class="nav-link p-0" aria-current="page" href="{% url 'forum:jobs' %}">Jobs</a>
                    </li>
                </ul>
            </div>
        </div>
            <form class="d-flex position-absolute start-50 translate-middle" role="search" style="top: 50%; z-index: 10;">
                <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search";"/>
            </form>
            <div class="d-flex justify-content-end" style="flex: 1;">
            <ul class="navbar-nav d-flex flex-row gap-3 mb-0 pe-3">
                {% if user.is_authenticated %}
                    <li class="nav-item">
                    <a class="nav-link p-0" aria-current="page" href="{% url 'forum:upload' %}">Upload</a>
                    </li>
                    <li class="nav-item">
                    <a class="nav-link p-0 active" href="{% url 'forum:logout' %}">Logout</a> 
                    </li>
                    <li class="nav-item">
                    <a class="nav-link p-0 active" href="{% url 'forum:profile_me' %}">{{ user.username }}</a>
                    </li>
                {% else %}
                    <li class="nav-item">
                    <a class="nav-link p-0" aria-current="page" href="{% url 'forum:login' %}">Login</a>
                    </li>
                    <li class="nav-item">
                    <a class="nav-link p-0" aria-current="page" href="{% url 'forum:register' %}">Register</a>
                    </li>
                {% endif %}    
            </ul>
            </div>
        </div>
        </nav>
        <div>
            {% block body_block %}
            {% endblock %}
    </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <script src="{% static 'js/script.js' %}"></script>
    </body>
</html>
