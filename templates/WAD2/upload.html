{% extends 'WAD2/base.html' %}

{% block title_block %}
    Upload a listing
{% endblock %}

{% block body_block %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h2 class="mb-4">Upload a New Job or Internship</h2>
            
            <div class="card upload-card shadow-lg p-4 mb-5">
                <form method="post" action="{% url 'forum:upload' %}">
                    {% csrf_token %}
                    
                    {{ form.as_p }} 
                    
                    <div class="text-center mt-4">
                </form>
                <button type="submit" class="btn btn-primary px-5 py-2 fw-bold">Submit Listing</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
